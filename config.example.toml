token = "<your-cloudflare-token>"

# update interval in seconds, when running in daemon mode
# interval = 300

# lookup provider for retrieving public IP
# currently only icanhazip is supported
# lookup = "icanhazip"

# Retry configuration for failed updates.
[retry]
# base delay in seconds before the first retry attempt
# base_delay = 5

# multiplier applied after each failed attempt
# backoff_multiplier = 2.0

# stop retrying after this many total attempts
# the interval also acts as a safeguard: retries stop if the next delay >= interval
# max_attempts = 5

# List of records to update
[[records]]
# full domain name, e.g. abc.example.com
name = "abc.example.com"
# zone name in CloudFlare, e.g. example.com
zone = "example.com"
# update A record
v4 = true
# update AAAA record
v6 = true

[[records]]
name = "v4.example.com"
zone = "example.com"
v4 = true

[[records]]
name = "v6.example.com"
zone = "example.com"
v6 = true

[[records]]
name = "abc.example.net"
zone = "example.net"
v4 = true
v6 = true

[[records]]
name = "v4.example.net"
zone = "example.net"
v4 = true

[[records]]
name = "v6.example.net"
zone = "example.net"
v6 = true
